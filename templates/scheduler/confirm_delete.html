{% extends "base.html" %}
{% block title %}Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header" style="background:#fee2e2;color:#991b1b">
                <i class="fas fa-exclamation-triangle me-2"></i>Confirm Deletion
            </div>
            <div class="card-body text-center py-5">
                <div style="font-size:48px;color:#ef4444;margin-bottom:16px">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <h5 class="fw-bold mb-2">Delete {{ object_type }}</h5>
                <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="fas fa-trash me-2"></i>Yes, Delete
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
