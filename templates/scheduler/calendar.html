{% extends 'base.html' %}
{% load i18n %}

{% block page_title %}{% trans "Master Calendar" %}{% endblock %}

{% block extra_css %}
<!-- FullCalendar CSS via CDN -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<style>
    /* Custom Modern Overrides for FullCalendar */
    #calendar {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        padding: 20px;
    }
    .fc-theme-standard .fc-scrollgrid {
        border: none !important;
    }
    .fc-col-header-cell {
        background-color: #f8f9fa;
        padding: 10px 0 !important;
        border: none !important;
        border-bottom: 2px solid #edf2f7 !important;
    }
    .fc-daygrid-day {
        border-color: #edf2f7 !important;
    }
    .fc-event {
        border: none !important;
        border-radius: 4px;
        padding: 3px 5px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: transform 0.1s ease-in-out, box-shadow 0.1s;
    }
    .fc-event:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .fc-toolbar-title {
        font-weight: 700 !important;
        font-size: 1.5rem !important;
        color: #2d3748;
    }
    .fc-button-primary {
        background-color: #f8f9fa !important;
        color: #4a5568 !important;
        border: 1px solid #e2e8f0 !important;
        text-transform: capitalize;
        box-shadow: none !important;
    }
    .fc-button-primary:hover {
        background-color: #edf2f7 !important;
    }
    .fc-button-active {
        background-color: #0d6efd !important;
        color: #ffffff !important;
        border-color: #0d6efd !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 fw-bold">{% trans "Master Schedule" %}</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSessionModal">
            <i class="fas fa-plus me-1"></i>{% trans "Drop Manual Session" %}
        </button>
    </div>

    <div id='calendar'></div>
</div>

<!-- Event Details Modal (Read-Only) -->
<div class="modal fade" id="eventDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="eventTitle">Session</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-2">
          <div class="mb-3">
              <span id="eventStatusBadge" class="badge">Status</span>
          </div>
          
          <div class="bg-light p-3 rounded mb-3">
              <small class="text-muted d-block text-uppercase mb-1" style="font-size: 0.7rem;">Time Details</small>
              <div class="d-flex align-items-center mb-2">
                  <i class="fas fa-clock text-primary me-2"></i>
                  <strong id="eventTutorTime"></strong>
              </div>
              <div class="d-flex align-items-center text-secondary">
                  <i class="fas fa-globe me-2"></i>
                  <span id="eventStudentTime"></span>
              </div>
              <div class="mt-2 small text-muted">
                  <i class="fas fa-stopwatch me-1"></i> <span id="eventDuration"></span> mins
              </div>
          </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: '{% url "scheduler:api_calendar_events" %}',
        slotMinTime: '06:00:00',
        slotMaxTime: '23:00:00',
        allDaySlot: false,
        height: 'auto',
        nowIndicator: true,
        eventClick: function(info) {
            info.jsEvent.preventDefault();
            var props = info.event.extendedProps;
            
            document.getElementById('eventTitle').innerText = info.event.title;
            document.getElementById('eventTutorTime').innerText = props.tutorTime;
            document.getElementById('eventStudentTime').innerText = props.studentTime;
            document.getElementById('eventDuration').innerText = props.duration;
            
            var badge = document.getElementById('eventStatusBadge');
            badge.innerText = props.status;
            
            // Set badge color based on event background color
            badge.style.backgroundColor = info.event.backgroundColor || '#6c757d';
            
            var modal = new bootstrap.Modal(document.getElementById('eventDetailModal'));
            modal.show();
        }
    });
    calendar.render();
});
</script>
{% endblock %}
