<!-- Student Status Toggle Component -->
<!-- Usage: {% include "scheduler/includes/student_status_toggle.html" %} -->
<!-- Expects: student object in context -->

<div class="student-status-toggle">
    <style>
        .toggle-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            border: 1px solid #dee2e6;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch:hover {
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-color: #28a745;
        }

        .toggle-switch.inactive {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-color: #dc3545;
        }

        .toggle-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .toggle-switch.active .toggle-dot {
            background-color: #28a745;
            color: white;
        }

        .toggle-switch.inactive .toggle-dot {
            background-color: #dc3545;
            color: white;
        }

        .toggle-label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            user-select: none;
            transition: all 0.3s ease;
        }

        .toggle-switch.active .toggle-label {
            color: #155724;
        }

        .toggle-switch.inactive .toggle-label {
            color: #721c24;
        }

        /* Loading state */
        .toggle-switch.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #dee2e6;
            border-top-color: #495057;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .toggle-switch.loading .toggle-spinner {
            display: inline-block;
        }

        .toggle-switch.loading .toggle-dot,
        .toggle-switch.loading .toggle-label {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <form id="toggle-form-{{ student.pk }}" 
          method="POST" 
          action="{% url 'scheduler:toggle_student_status' student.pk %}" 
          class="d-inline">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.path }}">
        
        <button type="submit" 
                class="toggle-switch {% if student.is_active %}active{% else %}inactive{% endif %}"
                title="Click to {% if student.is_active %}deactivate{% else %}activate{% endif %}"
                onclick="handleToggle(event, {{ student.pk }})">
            
            <div class="toggle-dot">
                {% if student.is_active %}
                    ✓
                {% else %}
                    ✕
                {% endif %}
            </div>
            <span class="toggle-label">
                {% if student.is_active %}
                    🟢 Active
                {% else %}
                    🔴 Inactive
                {% endif %}
            </span>
            <div class="toggle-spinner"></div>
        </button>
    </form>
</div>

<script>
function handleToggle(event, studentId) {
    event.preventDefault();
    
    const form = document.getElementById(`toggle-form-${studentId}`);
    const button = form.querySelector('.toggle-switch');
    const isActive = button.classList.contains('active');
    
    // Show confirmation for deactivation
    if (isActive) {
        const confirmed = confirm(
            '⚠️ Are you sure? Deactivating will:\n' +
            '• Remove all future scheduled sessions\n' +
            '• Keep past sessions intact\n' +
            '• Keep the schedule rules (you can re-activate later)\n\n' +
            'Continue?'
        );
        if (!confirmed) return;
    }
    
    // Add loading state
    button.classList.add('loading');
    
    // Submit form via AJAX
    const formData = new FormData(form);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', form.action, true);
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    
    xhr.onload = function() {
        button.classList.remove('loading');
        if (xhr.status === 200) {
            try {
                const response = JSON.parse(xhr.responseText);
                if (response.status === 'success') {
                    // Update button appearance
                    if (response.is_active) {
                        button.classList.remove('inactive');
                        button.classList.add('active');
                        button.querySelector('.toggle-dot').innerHTML = '✓';
                        button.querySelector('.toggle-label').innerHTML = ' Active';
                    } else {
                        button.classList.remove('active');
                        button.classList.add('inactive');
                        button.querySelector('.toggle-dot').innerHTML = '✕';
                        button.querySelector('.toggle-label').innerHTML = ' Inactive';
                    }
                    
                    // Show success feedback
                    showNotification(response.message, 'success');
                    
                    // Optionally refresh relevant parts of the page
                    if (typeof updateStudentCard === 'function') {
                        updateStudentCard(studentId, response.is_active);
                    }
                }
            } catch (e) {
                console.error('Failed to parse response:', e);
                form.submit(); // Fallback to regular form submission
            }
        } else {
            form.submit(); // Fallback to regular form submission
        }
    };
    
    xhr.onerror = function() {
        button.classList.remove('loading');
        form.submit(); // Fallback to regular form submission
    };
    
    xhr.send(formData);
}

function showNotification(message, type) {
    // Create a toast-style notification
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type === 'success' ? 'success' : 'info'} alert-dismissible fade show position-fixed`;
    alertDiv.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
    alertDiv.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'} me-2"></i>
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(alertDiv);
    
    // Auto-dismiss after 4 seconds
    setTimeout(() => {
        alertDiv.remove();
    }, 4000);
}
</script>
